      this.time.delayedCall(450,()=>this.scene.start('CloseupScene',{crowing:this._crowing}));
    };
    this._rightEdge = bgW - 80;
    this._playerControl = false;

    // ── Walk-in tween: Claudio enters from left, stops at ~20% of screen ──
    this.claudio.play('claudio-walk', true);
    this.tweens.add({
      targets: this.claudio,
      x: width * 0.20,
      duration: 2000,
      ease: 'Linear',
      onComplete: () => {
        this.claudio.anims.stop();
        this.claudio.setFrame(0);
        this._playerControl = true;  // hand off to player
      }
    });

    // ── Fade in ──
    this.cameras.main.fadeIn(700, 0, 0, 0);

    // ── Music: fade out title theme, start crowing at half volume ──
    [this._music, this.sound.get('theme')].forEach(s => {
      if(s && s.isPlaying)
        this.tweens.add({targets:s, volume:0, duration:900, onComplete:()=>s.stop()});
    });
    this.time.delayedCall(1000, () => {
      this._crowing = this.sound.add('crowing', {loop:true, volume:0});
      this._crowing.play();
      this.tweens.add({targets:this._crowing, volume:0.35, duration:1500});
    });
  }

  update(time, delta){
    if(!this._playerControl || this._transitioning) return;

    const spd = this.walkSpeed * (delta / 1000);
    let moving = false;

    const _cL=window.IS_MOBILE?window.VPAD.left :this.keyLeft.isDown;
    const _cR=window.IS_MOBILE?window.VPAD.right:this.keyRight.isDown;
    if(_cL){
      this.claudio.x -= spd;
      this.claudio.setFlipX(true);
      moving = true;
    } else if(_cR){
      this.claudio.x += spd;
      this.claudio.setFlipX(false);
      moving = true;
    }

    this.claudio.x = Phaser.Math.Clamp(this.claudio.x, 50, this._rightEdge);

    // Only toggle animation on state change to avoid fighting Phaser's anim manager
    if(moving && !this._wasMoving){
      this.claudio.play('claudio-walk');  // no ignoreIfPlaying flag = always restart fresh
    } else if(!moving && this._wasMoving){
      this.claudio.anims.stop();
      this.claudio.setFrame(0);
    }
    this._wasMoving = moving;

    // Right edge → next scene
    if(this.claudio.x >= this._rightEdge){
      this._transitioning = true;
      this.cameras.main.fadeOut(600, 0, 0, 0);
      this.time.delayedCall(650, () => this.scene.start('CloseupScene', {crowing:this._crowing}));
    }
  }
}

/* =====================================================================
   CLOSEUP SCENE — BGstreet2, Claudio walks then kneels, thought bubbles
===================================================================== */
class CloseupScene extends Phaser.Scene {
  constructor(){ super('CloseupScene'); }

  init(data){ this._crowing=data.crowing; }

  preload(){
    this.load.image('street_closeup','assets/bg/BGstreet2.png');
    this.load.spritesheet('claudio_walk','assets/claudio/claudio_walk.png',{frameWidth:256,frameHeight:256});
    this.load.spritesheet('claudio_back','assets/claudio/claudio_back.png',{frameWidth:256,frameHeight:256});
  }

  create(){
    const {width,height}=this.scale;
    this.add.image(width/2,height/2,'street_closeup').setDisplaySize(width,height).setDepth(0);

    const A=this.anims;
    if(!A.exists('claudio-walk'))
      A.create({key:'claudio-walk',frames:A.generateFrameNumbers('claudio_walk',{start:0,end:15}),frameRate:10,repeat:-1});
    if(!A.exists('claudio-back-walk'))
      A.create({key:'claudio-back-walk',frames:A.generateFrameNumbers('claudio_back',{start:0,end:6}),frameRate:10,repeat:-1});
    if(!A.exists('claudio-kneel'))
      A.create({key:'claudio-kneel',frames:A.generateFrameNumbers('claudio_back',{start:7,end:10}),frameRate:8,repeat:0});

    const groundY=height*0.82;

    // Phase 1: Claudio enters from left FACING RIGHT (front walk sprite)
    this.claudio=this.add.sprite(-180,groundY,'claudio_walk',0).setScale(2.2).setDepth(10);
    const leftThird=width*0.30;

    this.claudio.play('claudio-walk',true);
    this.tweens.add({
      targets:this.claudio, x:leftThird,
      duration:(leftThird+180)/260*1000, ease:'Linear',
      onComplete:()=>{
        // Phase 2: Swap to back-perspective sprite, walk forward (toward house)
        this.claudio.setTexture('claudio_back').setFrame(0);
        this.claudio.play('claudio-back-walk',true);
        // Walk a short distance forward (increase Y slightly to look like walking toward BG)
        this.tweens.add({
          targets:this.claudio, x:leftThird+60,
          duration:600, ease:'Linear',
          onComplete:()=>{
            // Phase 3: Kneel
            this.claudio.play('claudio-kneel',true);
            this.claudio.once('animationcomplete-claudio-kneel',()=>{
              this.claudio.anims.stop();
              this.claudio.setFrame(10);
              // Begin thought bubble sequence
              this.time.delayedCall(400,()=>this._runThoughtBubbles());
            });
          }
        });
      }
    });
    this.cameras.main.fadeIn(700,0,0,0);
    window.showSkipButton(this);
  }

  _killCurrentBubble(){
    // Immediately destroy any live bubble objects and cancel their timers
    if(this._bubbleTimer){ this._bubbleTimer.remove(false); this._bubbleTimer=null; }
    if(this._bubbleObjs){
      this.tweens.killTweensOf(this._bubbleObjs);
      this._bubbleObjs.forEach(o=>{ if(o&&o.active) o.destroy(); });
      this._bubbleObjs=null;
    }
  }

  _showBubble(text, onDone, duration){
    // Kill any previous bubble immediately before showing the next
    this._killCurrentBubble();

    const {width,height}=this.scale;
    const pad=18, bubbleW=460, lineH=26;
    const charsPerLine=Math.floor((bubbleW-pad*2)/11);
    const lines=text.split('\n');
    let totalLines=0;
    lines.forEach(l=>{ totalLines+=Math.max(1,Math.ceil(l.length/charsPerLine)); });
    const bubbleH=pad*2+totalLines*lineH+16;

    const bx=this.claudio.x+50;
    const by=this.claudio.y - this.claudio.displayHeight*0.6 - 20;

    const dots=[];
    for(let d=0;d<3;d++){
      const dr=5-d*1.4;
      const dot=this.add.circle(bx-10+d*10, by+bubbleH/2+8+d*14, dr, 0xffffff,0.92).setDepth(2101);
      dots.push(dot);
    }

    const bg=this.add.rectangle(bx,by,bubbleW,bubbleH,0xffffff,0.93)
      .setStrokeStyle(3,0x334466).setOrigin(0.5,1).setDepth(2100);
    const txt=this.add.text(bx,by-bubbleH+pad,text,{
      fontFamily:'Georgia,serif', fontSize:'20px', color:'#111133',
      wordWrap:{width:bubbleW-pad*2}, align:'left'
    }).setOrigin(0.5,0).setDepth(2102);

    const all=[bg,txt,...dots];
    this._bubbleObjs=all;   // track so skip can destroy them
    all.forEach(o=>o.setAlpha(0));
    this.tweens.add({targets:all,alpha:1,duration:300});

    this._bubbleTimer=this.time.delayedCall(duration,()=>{
      this._bubbleTimer=null;
      this.tweens.add({targets:all,alpha:0,duration:280,
        onComplete:()=>{
          all.forEach(o=>{ if(o&&o.active) o.destroy(); });
          this._bubbleObjs=null;
          if(onDone) onDone();
        }});
    });
  }

  _runThoughtBubbles(){
    // Very slow zoom during the thought bubble sequence (~50s total)
    this.cameras.main.zoomTo(1.22, 52000, 'Linear', false);
    const bubbles=[
      ["She's still beautiful.",                                                                              4500],
      ["Even after all these years...\nAfter everything we've been through...",                              5500],
      ["How does she manage it?",                                                                             4000],
      ["I should ask her. I should say,\n\"Newo, how do you do it?\"",                                      5500],
      ["And she'll say \"who is this?\"",                                                                    4000],
      ["And I'll say Claudio.",                                                                               3500],
      ["And she'll say \"Oh my god, Claudio,\nYou're... You're safe! You're...\"",                          6000],
      ["\"Where are you, Claudio? Come to me,\nlet's make up for lost time.\"",                             6000],
      ["That's exactly what she would say.",                                                                  4500],
      ["Will say.",                                                                                           3500],
    ];

    let i=0;
    let gapTimer=null;   // the 300ms gap timer between bubbles

    const skipNow=()=>{
      // 1. Cancel pending gap timer so we don't double-show next bubble
      if(gapTimer){ gapTimer.remove(false); gapTimer=null; }
      // 2. Kill any bubble currently on screen
      this._killCurrentBubble();
      // 3. Advance
      next();
    };

    window._skipAction = skipNow;

    const next=()=>{
      window._skipAction = skipNow;   // always point at the live skipNow closure
      if(i>=bubbles.length){
        window.hideSkipButton();
        this.time.delayedCall(800,()=>{
          this.cameras.main.fadeOut(800,0,0,0);
          this.time.delayedCall(850,()=>{
            this.scene.start('Street3Scene',{crowing:this._crowing});
          });
        });
        return;
      }
      const [text,dur]=bubbles[i++];
      // Short gap between bubbles; store timer so skip can cancel it
      gapTimer=this.time.delayedCall(300,()=>{ gapTimer=null; this._showBubble(text,next,dur); });
    };
    next();
  }
}

/* =====================================================================
   STREET 3 SCENE — Claudio kneeling, faces camera, dog enters
===================================================================== */
class Street3Scene extends Phaser.Scene {
  constructor(){ super('Street3Scene'); }

  init(data){ this._crowing=data.crowing; }

  preload(){
    this.load.image('street3','assets/bg/BGstreet3.png');
    this.load.image('claudio_cam',      'assets/claudio/claudio_crouch_cam.png');
    this.load.image('claudio_nothappy', 'assets/claudio/claudio_crouch_nothappy.png');
    this.load.image('claudio_apollo',   'assets/claudio/claudio_crouch_apollo.png');
    this.load.spritesheet('apollo_sit',     'assets/apollo/apollo_sit.png',     {frameWidth:128,frameHeight:128});
    this.load.spritesheet('apollo_idle',    'assets/apollo/apollo_idle.png',    {frameWidth:128,frameHeight:128});
    this.load.spritesheet('apollo_running', 'assets/apollo/apollo_running.png', {frameWidth:128,frameHeight:128});
  }

  create(){
    const {width,height}=this.scale;

    this.add.image(width/2,height/2,'street3').setDisplaySize(width,height).setDepth(0);

    const A=this.anims;
    if(!A.exists('apollo-sit'))
      A.create({key:'apollo-sit',     frames:A.generateFrameNumbers('apollo_sit',    {start:4,end:15}),frameRate:10,repeat:0});
    if(!A.exists('apollo-idle'))
      A.create({key:'apollo-idle',    frames:A.generateFrameNumbers('apollo_idle',   {start:0,end:15}),frameRate:6, repeat:-1});
    if(!A.exists('apollo-running'))
      A.create({key:'apollo-running', frames:A.generateFrameNumbers('apollo_running',{start:0,end:15}),frameRate:12,repeat:-1});

    // Ground level for this BG — slightly higher because grass is in foreground
    const groundY=height*0.78;

    // Claudio — facing camera, centered left-third
    const claudioX=width*0.32;
    this.claudio=this.add.image(claudioX,groundY,'claudio_cam')
      .setScale(2.5).setOrigin(0.5,1).setDepth(10);

    this.cameras.main.fadeIn(700,0,0,0);

    // Very slow zoom in over 6 seconds
    this.cameras.main.zoomTo(1.18, 6000, 'Linear', false);

    // After 6s: growl graphic
    this.time.delayedCall(6000,()=>this._doGrowl());
    window.showSkipButton(this);
    window._skipAction = ()=>{ this._doGrowl(); };
  }

  _doGrowl(){
    const {width,height}=this.scale;
    window._skipAction = ()=>{ this._switchToNotHappy(); };
    // Rumble camera
    this.cameras.main.shake(400,0.006);

    // Growl text — jagged red
    const growl=this.add.text(width*0.5,height*0.35,
      'GRRRRRRRRRRrrrrrrrr.....',
      {fontFamily:'Arial Black', fontSize:'64px', color:'#cc1111',
       stroke:'#330000', strokeThickness:8}
    ).setOrigin(0.5).setScrollFactor(0).setDepth(500).setAlpha(0);

    // Slight scale jitter for impact
    this.tweens.add({targets:growl, alpha:1, scaleX:1.05, scaleY:0.95, duration:180,
      onComplete:()=>{
        this.tweens.add({targets:growl, scaleX:1, scaleY:1, duration:120});
      }
    });

    this.time.delayedCall(1800,()=>{
      this.tweens.add({targets:growl, alpha:0, duration:300,
        onComplete:()=>{ growl.destroy(); this._switchToNotHappy(); }});
    });
  }

  _switchToNotHappy(){
    const {width,height}=this.scale;
    window._skipAction = ()=>{ this._apolloEnters(); };
    const groundY=height*0.78;
    const claudioX=width*0.32;

    // Swap to not-happy image
    this.claudio.destroy();
    this.claudio=this.add.image(claudioX,groundY,'claudio_nothappy')
      .setScale(2.5).setOrigin(0.5,1).setDepth(10);

    // Stop the slow zoom, reset camera gently
    this.cameras.main.zoomTo(1.0, 800, 'Linear');

    // Apollo enters from right
    this.time.delayedCall(300,()=>this._apolloEnters());
  }

  _apolloEnters(){
    const {width,height}=this.scale;
    // Claudio is at width*0.32, Apollo stops just to his right, faces left = toward Claudio
    const groundY=height*0.80;
    const stopX=width*0.56;

    this.apollo=this.add.sprite(width+150,groundY,'apollo_running',0)
      .setScale(4.5).setOrigin(0.5,1).setDepth(11).setFlipX(true); // running left
    this.apollo.play('apollo-running',true);

    this.tweens.add({
      targets:this.apollo, x:stopX,
      duration:(width+150-stopX)/400*1000, ease:'Linear',
      onComplete:()=>{
        // Play sit-down transition (frames 4-15), then switch to idle loop
        this.apollo.setFlipX(true); // face left = toward Claudio
        this.apollo.play('apollo-sit');
        this.apollo.once('animationcomplete-apollo-sit', ()=>{
          this.apollo.play('apollo-idle'); // proper idle loop
          this.time.delayedCall(800,()=>this._claudioSmiles());
        });
      }
    });
  }

  _claudioSmiles(){
    const {width,height}=this.scale;
    const groundY=height*0.78;
    const claudioX=width*0.32;

    // Crossfade to smiling image
    const newImg=this.add.image(claudioX,groundY,'claudio_apollo')
      .setScale(2.5).setOrigin(0.5,1).setDepth(10).setAlpha(0);
    this.tweens.add({targets:newImg, alpha:1, duration:400,
      onComplete:()=>{ this.claudio.destroy(); this.claudio=newImg; }
    });

    // Hold for a few seconds — placeholder for next scene/dialogue
    // For now, any key advances to GameScene
    this.time.delayedCall(1000,()=>{
      const prompt=this.add.text(width/2,height*0.93,'Press any key to continue...',
        {fontFamily:'Arial',fontSize:'22px',color:'#aaaaee'}
      ).setOrigin(0.5).setAlpha(0.8).setScrollFactor(0).setDepth(200);
      this.tweens.add({targets:prompt,alpha:0.1,duration:700,yoyo:true,repeat:-1});
      this._ready=true;
      window._skipAction = ()=>{ advance(); };
      const advance=()=>{
        if(!this._ready) return;
        this._ready=false;
        // Fade out crowing music before switching to Chase's scene
        if(this._crowing && this._crowing.isPlaying){
          this.tweens.add({targets:this._crowing, volume:0, duration:700,
            onComplete:()=>this._crowing.stop()});
        }
        window.hideSkipButton();
        this.cameras.main.fadeOut(700,0,0,0);
        this.time.delayedCall(750,()=>{
          // Pass null so GameScene starts InKeeping theme fresh
          this.scene.start('GameScene',{music:null, level:1});
        });
      };
      this.input.keyboard.on('keydown',advance);
      this.input.on('pointerdown',advance);
    });
  }
}
